<!DOCTYPE html>
<html lang="ja">
<head>
  <!-- HTMLヘッダー -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>自動筆算プログラム PaperCalc</title>
  <!-- meta description -->
  <meta name="description" content="自動的に筆算を計算します。" />
  <!-- キーワード設定で検索にかかりやすくする。 -->
  <meta name="keywords" content="自動筆算プログラム,PaperCalc,小学生向け算数教材,片山博文MZ,katahiromz,JavaScript" />
  <!-- JavaScript読み込み -->
  <script src="util.js"></script>
  <script src="Paper.js"></script>
  <script src="AlgoBase.js"></script>
  <script src="AlgoAdd.js"></script>
  <script src="AlgoSub.js"></script>
  <script src="AlgoMul.js"></script>
  <script src="AlgoDiv.js"></script>
  <script src="AlgoTest.js"></script>
  <script src="main.js"></script>
  <!-- スタイルシート読み込み -->
  <link rel="stylesheet" type="text/css" href="main.css" />
  <!-- 【Open Graph Protocol】ここから -->
  <meta property="og:title" content="自動筆算プログラム PaperCalc" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://katahiromz.github.io/paper-calc/" />
  <meta property="og:description" content="自動的に筆算を計算する算数教材です" />
  <meta property="og:site_name" content="PaperCalc" />
  <meta property="og:locale" content="ja_JP" />
  <!-- 【Open Graph Protocol】ここまで -->
  <!-- 自動翻訳しない設定 -->
  <meta name="google" content="notranslate" />
</head>
<body>
  <!-- ページ ヘッダー -->
  <header class="center">
    ひっ算プログラム PaperCalc
  </header>
  <!-- コンテナ -->
  <div id="my-container">
    <!-- コントロール パネル -->
    <div id="my-control-panel">
      <!-- 計算の種類 -->
      <span class="no-wrap">
        <select id="my-select" disabled>
          <option value="add">たし算</option>
          <option value="sub">ひき算</option>
          <option value="mul">かけ算</option>
          <option value="div">わり算</option>
          <!-- <option value="test">テスト</option> -->
        </select>
      </span>
      <!-- 速度 -->
      <span class="no-wrap">
        はやさ: <input type="range" id="my-speed-range" min="1" max="7" step="1" value="4" style="vertical-align: middle;" disabled />
        <span id="speed-label">5</span>
      </span>
      <br />
      <!-- 計算対象の数 -->
      <span class="no-wrap">
        <span id="label-a">数A</span>: <input type="text" id="my-text-a" value="12345" size="4" maxlength="20" disabled />
      </span>
      <span class="no-wrap">
        <span id="label-b">数B</span>: <input type="text" id="my-text-b" value="6789" size="4" maxlength="20" disabled />
      </span>
      <!-- 精度 -->
      <span id="my-accuracy" class="no-wrap hidden">
        <span id="label-c">小数点以下</span>: <input type="number" id="my-text-c" value="0" min="0" max="10" disabled />けた まで
      </span>
      <br />
      <!-- 計算対象の数に対するエラーメッセージ -->
      <div id="input-error-message"></div>
      <div class="button-group">
        <!-- ボタン群 -->
        <button id="my-start-button" disabled>さいせい ▶</button>
        <button id="my-stop-button" disabled>とめる ■</button>
        <button id="my-next-step-button" disabled>1歩すすむ ＞</button>
        <button id="my-reset-button" disabled>リセット</button>
      </div>
    </div>
    <div id="my-canvas-space">
      <!-- メイン キャンバス -->
      <canvas id="my-canvas" width="1" height="1"></canvas>
    </div>
    <div>
      <!-- テキストエリア（説明などを表示する） -->
      <div id="my-textarea"></div>
    </div>
  </div>
  <!-- ページ フッター -->
  <footer class="center">
    Ver.1.0.3 &copy; 2026&nbsp;katahiromz&nbsp;制作、山口@Webぐち&nbsp;監修
  </footer>
</body></html>
